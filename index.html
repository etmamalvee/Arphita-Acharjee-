<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Arphita Apu! 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 90%;
            width: 450px;
            animation: popIn 1s ease-out forwards;
            z-index: 10;
        }
        h1 {
            color: #ff477e;
            font-size: 2.5rem;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }
        p {
            color: #4a4a4a;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .highlight {
            color: #ff1493;
            font-weight: bold;
        }
        .btn {
            background: #ff477e;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
        }
        .btn:hover {
            background: #ff1493;
            transform: scale(1.05);
        }
        /* Confetti Particle */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd166;
            top: -10px;
            border-radius: 50%;
            animation: fall linear infinite;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Happy Birthday,<br><span class="highlight">Arphita Apu!</span> 🎂</h1>
        <p>১২ই জুলাই আপনার জীবনের আরও একটি সুন্দর বছরের সূচনা হোক। আপনার আগামী দিনগুলো আনন্দ, সাফল্য আর হাসিতে ভরে উঠুক এই কামনাই করি! 🎉🌟</p>
        <button class="btn" onclick="createMoreConfetti()">Click for a Surprise! 🥳</button>
    </div>

    <script>
        // অটোমেটিক কনফেটি অ্যানিমেশন শুরু
        function createParticle() {
            const colors = ['#ff477e', '#ff7096', '#ff94b8', '#ffb3c1', '#ffd166', '#06d6a0', '#118ab2'];
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = confetti.style.height = Math.random() * 8 + 6 + 'px';
            if(Math.random() > 0.5) confetti.style.borderRadius = '0%'; // কিছু চারকোনা কনফেটি
            
            document.body.appendChild(confetti);
            
            setTimeout(() => {
                confetti.remove();
            }, 5000);
        }

        // প্রতি ৩০০ মিলিসেকেন্ডে কনফেটি তৈরি হবে
        setInterval(createParticle, 300);

        // বাটনে ক্লিক করলে এক্সট্রা অ্যানিমেশন
        function createMoreConfetti() {
            for(let i=0; i<50; i++) {
                setTimeout(createParticle, Math.random() * 500);
            }
        }
    </script>
</body>
</html>
